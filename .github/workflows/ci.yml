name: CI

on:
  workflow_dispatch:
    inputs:
      branch:
        description: "Branch to run CI on"
        required: true
        default: main
        type: choice
        options:
          - main
          - dev-meta

concurrency:
  group: ci-${{ github.workflow }}-${{ inputs.branch }}
  cancel-in-progress: true

jobs:
  test:
    name: typecheck + tests + coverage
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.branch }}

      - name: Install pnpm (driven by packageManager field)
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm typecheck

      - name: Run tests with coverage
        run: pnpm coverage

      - name: Upload coverage HTML
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-html-${{ inputs.branch }}
          path: coverage/
          retention-days: 7
